<div class="item-flex-container">

  <!-- Tree panel -->
  <div #treePanel class="item-panel tree-panel" [class.panel-collapsed]="!treePanelOpen"
       [style.flex-basis.px]="treePanelOpen ? treeWidth : null">
    <div class="panel-collapsed-bar" *ngIf="!treePanelOpen" (click)="treePanelOpen = true">
      <mat-icon class="panel-expand-icon">chevron_right</mat-icon>
      <span class="panel-collapsed-title">Arborescence</span>
    </div>
    <ng-container *ngIf="treePanelOpen">
      <div class="item-panel-header">
        <span class="item-panel-title">Arborescence</span>
        <button class="item-collapse-btn" type="button" (click)="treePanelOpen = false" matTooltip="Collapse">
          <mat-icon>chevron_left</mat-icon>
        </button>
      </div>
      <div class="item-panel-body" #drawer>
        <div class="filter-wrapper">
          <input id="filter" class="form-control" #filter (keyup)="filterNodes(filter.value, tree.treeModel)"
                 placeholder="Filter items by label or linkId"/>
          <mat-icon class="filter-icon">search</mat-icon>
        </div>
        <span (focusin)="treeInitialFocus($event)">
          <tree-root #tree
                     [nodes]="itemList"
                     [options]="treeOptions"
                     (event)="onTreeEvent($event)"
                     role="tree"
          >
            <ng-template #treeNodeWrapperTemplate let-node let-index="index">
              <div class="node-wrapper" [style.padding-left]="node.getNodePadding()" role="group">
                <tree-node-expander [node]="node"></tree-node-expander>
                <div class="node-content-wrapper"
                     [class.node-content-wrapper-active]="node.isActive"
                     [class.node-content-wrapper-focused]="node.isFocused"
                     (click)="node.mouseAction('click', $event)"
                     (dblclick)="node.mouseAction('dblClick', $event)"
                     (contextmenu)="node.mouseAction('contextMenu', $event)"
                     (treeDrop)="node.onDrop($event)"
                     [treeAllowDrop]="node.allowDrop"
                     [treeDrag]="node"
                     [treeDragEnabled]="node.allowDrag()"
                     [attr.tabindex]="node.isActive ? '0' : null"
                     role="treeitem"
                     [attr.aria-selected]="node.isActive"
                >
                  <tree-node-content [node]="node" [index]="index" [template]="treeNodeTemplate"></tree-node-content>
                </div>
              </div>
            </ng-template>
            <ng-template #treeNodeTemplate let-node let-index="index">
              <div [ngClass]="node.nodeClass"
                   class="{{node.data.__$hiddenItemYesNo ? 'disabled-node ': ''}} d-flex"
                   #tooltip="matTooltip" [matTooltip]="node.displayField">
                <span class="node-display-prefix" aria-hidden="true"
                      [innerHTML]="getIndexPath(node).join('.') | highlight: filter.value"></span>
                <span aria-hidden="true" class="text-truncate flex-fill node-display-field" [ngClass]="node.nodeClass"
                      [innerHTML]="node.displayField | highlight: filter.value"></span>
                <mat-icon class="warningIcon" [matTooltip]="warningMessage" *ngIf="hasWarnings(node)" color="warn">warning</mat-icon>
                <ng-container *ngTemplateOutlet="nodeMenu; context: {node: node, tooltip: tooltip}"></ng-container>
              </div>
            </ng-template>
            <ng-template #loadingTemplate><span></span></ng-template>
          </tree-root>
        </span>
      </div>
    </ng-container>
  </div>

  <!-- Splitter between tree and properties -->
  <div class="splitter" *ngIf="treePanelOpen && rightPanelOpen"
       (mousedown)="onSplitterDown($event)"
       (dblclick)="onSplitterDblClick()"></div>

  <!-- Properties panel -->
  <div #propertiesPanel class="item-panel properties-panel" [class.panel-collapsed]="!rightPanelOpen"
       [style.flex-basis.px]="rightPanelOpen ? propertiesWidth : null">
    <div class="panel-collapsed-bar" *ngIf="!rightPanelOpen" (click)="rightPanelOpen = true">
      <mat-icon class="panel-expand-icon">chevron_right</mat-icon>
      <span class="panel-collapsed-title">Properties</span>
    </div>
    <ng-container *ngIf="rightPanelOpen">
      <div class="item-panel-header">
        <span class="item-panel-title" aria-live="polite" aria-atomic="true" id="itemContent">
          <span *ngIf="focusNode?.data?.text">{{ getIndexPath(focusNode).join('.') }} {{ focusNode.data.text }}</span>
          <span *ngIf="!focusNode?.data?.text">Current Item</span>
        </span>
        <button class="item-collapse-btn" type="button" (click)="rightPanelOpen = false" matTooltip="Collapse">
          <mat-icon>chevron_left</mat-icon>
        </button>
      </div>
      <div class="item-panel-body">
        <ng-container *ngIf="editType === 'ui'">
          <lfb-spinner [show]="spinner$ | async"></lfb-spinner>
          <lfb-ngx-schema-form [isHiddenRadioItem]="hasHiddenRadio()" disabled="true" #uiEditor [model]="itemData"
                               (valueChange)="itemChanged($event)" appReadonly
                               (errorsChanged)="onErrorsChanged($event)"
                               (warningsChanged)="onWarningsChanged($event)"></lfb-ngx-schema-form>
        </ng-container>
        <ng-container *ngIf="editType === 'json'">
          <lfb-item-json-editor #jsonEditor></lfb-item-json-editor>
        </ng-container>
        <div *ngIf="errors$ | async" class="text-danger" style="margin: 10px 0;" aria-hidden="true">{{ errorMessage }}</div>
        <div class="item-actions" appReadonly>
          <button type="button" class="btn-delete-item"
                  [disabled]="!(focusNode && focusNode.parent)"
                  aria-label="Delete this item"
                  (click)="confirmItemDelete()">Delete this item
          </button>
        </div>
      </div>
    </ng-container>
  </div>

</div>

<ng-template #addItemDlg let-modal>
  <div class="modal-header btn-primary">
    <h4 class="modal-title" id="modal-basic-title">Add LOINC item</h4>
    <button type="button" class="btn-close btn-primary" aria-label="Close" (click)="modal.dismiss('Cross click')">
    </button>
  </div>
  <div class="modal-body">
    <form>
      <div class="form-group">
        <label for="loincTypeSelect1" class="align-middle">Select LOINC item type:</label>
        <div class="btn-group" id="loincTypeSelect1">
          <label *ngFor="let opt of loincTypeOpts" class="btn">
            <input type="radio" name="loincType"
                   [value]="opt.value"
                   [(ngModel)]="loincType"
                   [ngModelOptions]="{standalone: true}"> {{ opt.display }}
          </label>
        </div>
        <label class="" for="acSearchBoxId">Search for a LOINC item:</label>
        <input id="acSearchBoxId" type="text" class="form-control"
               [(ngModel)]="loincItem"
               [ngModelOptions]="{standalone: true}"
               [ngbTypeahead]="acSearch"
               [resultFormatter]="formatter"
               [inputFormatter]="formatter"
               [editable]='false'/>
      </div>
    </form>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-primary" (click)="modal.dismiss(false)">Cancel</button>
    <button type="button" class="btn btn-primary" (click)="modal.close(loincItem)">Add</button>
  </div>
</ng-template>


<ng-template #nodeMenu let-node="node" let-parentTooltip="tooltip">
  <div class="d-inline-block" ngbDropdown #myDrop="ngbDropdown" container="body" appReadonly
       role="group"
       (openChange)="handleContextMenuOpen($event)"
       (mouseenter)="parentTooltip.hide()"
       (mouseleave)="parentTooltip.show()">
    <button ngbDropdownToggle appReadonly
            class="btn btn-sm p-0 border px-1"
            matTooltip="More options"
            [attr.tabindex]="node.isActive ? null : '-1'"
            (keydown.arrowDown)="preventEventPropagation($event)"
            (keydown.arrowUp)="preventEventPropagation($event)"
            (keydown.enter)="myDrop.toggle()"
    >
      <fa-icon style="pointer-events: auto;" [icon]="nodeMenuIcon" (click)="closeDropDowns()"></fa-icon>
    </button>
    <div class="dropdown-menu" ngbDropdownMenu role="menu"
         (keydown.arrowDown)="preventEventPropagation($event)"
         (keydown.arrowUp)="preventEventPropagation($event)"
    >
      <button ngbDropdownItem role="menuitem"
              (keyup.enter)="onInsertItem(myDrop, $event, node, 'BEFORE')"
              (click)="onInsertItem(myDrop, $event, node, 'BEFORE')"
      >Insert a new item <b>before</b> this
      </button>
      <button ngbDropdownItem role="menuitem"
              (keyup.enter)="onInsertItem(myDrop, $event, node, 'AFTER')"
              (click)="onInsertItem(myDrop, $event, node, 'AFTER')"
      >Insert a new item <b>after</b> this
      </button>
      <button ngbDropdownItem role="menuitem"
              (keyup.enter)="onInsertItem(myDrop, $event, node, 'CHILD')"
              (click)="onInsertItem(myDrop, $event, node, 'CHILD')"
      >Insert a new <b>child</b> item
      </button>
      <div class="dropdown-divider" role="separator"></div>
      <button ngbDropdownItem role="menuitem"
              (keyup.enter)="onMoveDlg($event, node); myDrop.close()"
              (click)="onMoveDlg($event, node)"
      >Move this item ...
      </button>
      <div class="dropdown-divider" role="separator"></div>
      <button ngbDropdownItem role="menuitem"
              (keyup.enter)="onCopyDlg($event, node); myDrop.close()"
              (click)="onCopyDlg($event, node)"
      >Duplicate this item ...
      </button>
      <div class="dropdown-divider" role="separator"></div>
      <button ngbDropdownItem role="menuitem"
              (keyup.enter)="confirmItemDelete();myDrop.close()"
              (click)="confirmItemDelete()"
      >Remove this item
      </button>
    </div>
  </div>
</ng-template>
