<div class="fu-wrapper">
  <input id="input_{{fileName}}"
    type="file"
    hidden
    #fileInput
    accept=".csv"
    (change)="handleFileInputChange(fileInput.files)"
  />
  <button type="button" class="fu-attach-btn" (click)="chooseFile(fileInput)">Attach a file</button>
  <span class="fu-filename">{{ uploadForm.value.display || '' }}</span>
  <button type="button" class="fu-clear-btn" *ngIf="uploadForm.value.display" (click)="reset()">
    <mat-icon>clear</mat-icon>
  </button>
</div>
