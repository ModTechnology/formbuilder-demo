<div class="preview-dlg-header">
  <h2 class="preview-title">Preview of Questionnaire</h2>
  <button class="btn-close-preview" type="button" [mat-dialog-close]="true" aria-label="Close">
    <mat-icon>close</mat-icon>
  </button>
</div>

<mat-dialog-content class="lfb-mat-tab-content">
  <mat-tab-group [mat-stretch-tabs]="false">
    <mat-tab label="View Rendered Form">
      <ng-template matTabContent>
        <div class="preview-info">
          <span class="info-text">
            This preview is being handled by
            <a href="https://lhncbc.github.io/lforms/" target="_blank" rel="noopener">LHC-Forms</a>,
            which you can also use via the
            <a href="https://lhncbc.github.io/questionnaire-viewer/" target="_blank" rel="noopener">Questionnaire Viewer</a>,
            or in your own applications.
          </span>
          <span class="lforms-version">LForms version: {{ lformsVersion }}</span>
        </div>
        <div *ngIf="lformsErrors" class="preview-error">{{ lformsErrors }}</div>
        <div class="preview-body">
          <wc-lhc-form #lhcForm [questionnaire]="data?.questionnaire" [options]="data.lfData.options"
                       (onError)="handleLFormsError($event)"></wc-lhc-form>
        </div>
      </ng-template>
    </mat-tab>
    <mat-tab label="View Questionnaire JSON">
      <ng-template matTabContent>
        <pre class="fix-pre">{{ data?.questionnaire | json }}</pre>
      </ng-template>
    </mat-tab>
  </mat-tab-group>
</mat-dialog-content>

<mat-dialog-actions class="preview-dlg-actions" align="end">
  <button class="btn-close-dialog" type="button" (click)="close()">Close</button>
</mat-dialog-actions>
